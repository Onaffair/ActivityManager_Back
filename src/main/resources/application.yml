spring:
    application:
        name: online_chat
    mvc:
        format:
            date-time: yyyy-MM-dd HH:mm:ss
    jackson:
        date-format: yyyy-MM-dd HH:mm:ss
        time-zone: GMT+8
        serialization:
          write-dates-as-timestamps: false
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/online_chat
        password: 123456
        username: root
    servlet:
        multipart:
            max-file-size: 5MB
mybatis-plus:
    type-aliases-package: com.example.onaffair.online_chat.entity
    global-config:
        db-config:
            update-strategy: not_empty
    type-handlers-package: com.example.onaffair.online_chat.handler

server:
    port: 721

